services:
  # Self-test service - runs first to verify dependencies
  self-test:
    image: alpine:latest
    volumes:
      - ./scripts/self-test.sh:/self-test.sh:ro
    command: sh -c "apk add --no-cache netcat-openbsd postgresql-client curl && sh /self-test.sh"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
      jupyter:
        condition: service_healthy
    networks:
      - default
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: change-me-locally
      POSTGRES_DB: mylake
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mylake"]
      interval: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: mylake-access
      RUSTFS_SECRET_KEY: mylake-secret-key
    ports:
      - "0.0.0.0:9001:9000"
    volumes:
      - rustfs-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://admin:change-me-locally@postgres:5432/mylake
      JWT_SECRET: dev-secret-change-in-production
      PORT: 8080
      NOTEBOOKS_DIR: /app/notebooks
    ports:
      - "0.0.0.0:8080:8080"
    depends_on:
      self-test:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - jupyter-data:/home/jovyan/work
      - ./notebooks:/app/notebooks

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "0.0.0.0:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  jupyter:
    image: jupyter/pyspark-notebook:latest
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "mylake-token-123"
      SPARK_OPTS: "--driver-memory=2g --executor-memory=2g"
      JUPYTER_URL: "http://207.180.223.160:8888"
      JUPYTER_CONFIG: |
        c.NotebookApp.token = 'mylake-token-123'
        c.NotebookApp.password = ''
        c.NotebookApp.allow_origin = '*'
        c.NotebookApp.allow_remote_access = True
        c.NotebookApp.disable_check_xsrf = True
        c.NotebookApp.ip = '0.0.0.0'
        c.NotebookApp.tornado_settings = {
            'headers': {
                'Content-Security-Policy': "frame-ancestors * 'self' http://207.180.223.160:5173 http://localhost:5173",
                'X-Frame-Options': 'ALLOWALL'
            }
        }
    ports:
      - "0.0.0.0:8888:8888"
    volumes:
      - jupyter-data:/home/jovyan/work
      - ./notebooks:/home/jovyan/notebooks
      - ./scripts/jupyter-config.py:/home/jovyan/.jupyter/jupyter_notebook_config.py
    depends_on:
      - postgres

volumes:
  postgres-data:
  rustfs-data:
  jupyter-data:
