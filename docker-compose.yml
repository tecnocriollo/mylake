services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: change-me-locally
      POSTGRES_DB: mylake
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mylake"]
      interval: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: mylake-access
      RUSTFS_SECRET_KEY: mylake-secret-key
    ports:
      - "0.0.0.0:9001:9000"
    volumes:
      - rustfs-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://admin:change-me-locally@postgres:5432/mylake
      JWT_SECRET: dev-secret-change-in-production
      PORT: 8080
    ports:
      - "0.0.0.0:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - jupyter-data:/home/jovyan/work

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "0.0.0.0:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  jupyter:
    image: jupyter/pyspark-notebook:latest
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "mylake-token-123"
      SPARK_OPTS: "--driver-memory=2g --executor-memory=2g"
    ports:
      - "0.0.0.0:8888:8888"
    volumes:
      - jupyter-data:/home/jovyan/work
      - ./notebooks:/home/jovyan/notebooks
    command: >
      start-notebook.sh
      --NotebookApp.token='mylake-token-123'
      --NotebookApp.password=''
      --NotebookApp.allow_origin='*'
      --NotebookApp.disable_check_xsrf=True

volumes:
  postgres-data:
  rustfs-data:
  jupyter-data:
