services:
  # Self-test service - runs first to verify dependencies
  self-test:
    image: alpine:latest
    volumes:
      - ./scripts/self-test.sh:/self-test.sh:ro
    command: sh -c "apk add --no-cache netcat-openbsd postgresql-client curl && sh /self-test.sh"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
      marimo:
        condition: service_healthy
    networks:
      - default
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: change-me-locally
      POSTGRES_DB: mylake
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mylake"]
      interval: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: mylake-access
      RUSTFS_SECRET_KEY: mylake-secret-key
    ports:
      - "0.0.0.0:9001:9000"
    volumes:
      - rustfs-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://admin:change-me-locally@postgres:5432/mylake
      JWT_SECRET: dev-secret-change-in-production
      PORT: 8080
      NOTEBOOKS_DIR: /app/notebooks
      JUPYTER_URL: http://jupyter:8888
      JUPYTER_TOKEN: mylake-token-123
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
    ports:
      - "0.0.0.0:8080:8080"
    depends_on:
      self-test:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - jupyter-data:/home/jovyan/work
      - ./notebooks:/app/notebooks

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "0.0.0.0:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    environment:
      SPARK_CONNECT_MODE_ENABLED: "1"
    ports:
      - "0.0.0.0:15002:15002"
      - "0.0.0.0:4040:4040"
    volumes:
      - spark-data:/tmp/spark-events
      - ./notebooks:/notebooks
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "15002"]
      interval: 10s
      retries: 5

  marimo:
    build:
      context: ./marimo
      dockerfile: Dockerfile
    environment:
      MARIMO_HOST: "0.0.0.0"
      MARIMO_PORT: "2718"
    ports:
      - "0.0.0.0:2718:2718"
    volumes:
      - marimo-data:/app/notebooks
      - ./notebooks:/app/notebooks
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2718"]
      interval: 10s
      retries: 5

volumes:
  postgres-data:
  rustfs-data:
  jupyter-data:
  spark-data:
