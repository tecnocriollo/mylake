services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: change-me-locally
      POSTGRES_DB: mylake
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mylake"]
      interval: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: mylake-access
      RUSTFS_SECRET_KEY: mylake-secret-key
    ports:
      - "9000:9000"
    volumes:
      - rustfs-data:/data

volumes:
  postgres-data:
  rustfs-data:
